<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOMAAD Catering — Захиалгууд</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Lora:wght@600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F5F0E6;--surface:#fff;--ink:#20271F;--muted:#8A8276;
  --line:#E2E6DF;--accent:#1F4A38;--accent-soft:#E3EDE7;
  --amber:#C8743F;--amber-soft:#F5E2D5;--radius:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);padding-bottom:60px}
.band{height:6px;background:linear-gradient(90deg,#1F4A38 0 25%,#6B8E6F 25% 50%,#D9C7A3 50% 75%,#C8743F 75%)}
.topbar{background:linear-gradient(135deg,#163528,#1F4A38 55%,#2E6049);color:#fff;padding:22px 0}
.wrap{max-width:1100px;margin:0 auto;padding:0 18px}
.topbar .wrap{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:10px}
.dot-ico{width:34px;height:34px;border-radius:10px;background:rgba(255,255,255,.16);display:grid;place-items:center;font-size:17px}
.brand h1{font-family:'Lora',serif;font-size:20px;font-weight:700}
.tag{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;background:rgba(255,255,255,.16);padding:5px 12px;border-radius:999px}
.btn-refresh{font-family:inherit;font-size:12px;font-weight:700;background:rgba(255,255,255,.18);color:#fff;border:1.5px solid rgba(255,255,255,.3);border-radius:8px;padding:7px 14px;cursor:pointer;transition:all .15s}
.btn-refresh:hover{background:rgba(255,255,255,.28)}

#denied{display:none;text-align:center;padding:100px 20px}
#denied h2{font-family:'Lora',serif;font-size:28px;margin-bottom:12px;color:var(--accent)}
#denied p{color:var(--muted);font-size:15px}

#main{display:none}
.page-title{padding:28px 0 4px;font-family:'Lora',serif;font-size:24px;font-weight:700}
.page-sub{color:var(--muted);font-size:13px;margin-bottom:22px}

.tabs{display:flex;gap:0;margin-bottom:20px;border-bottom:2px solid var(--line)}
.tab-btn{font-family:inherit;font-size:13px;font-weight:700;padding:10px 22px;border:none;border-bottom:3px solid transparent;background:none;cursor:pointer;color:var(--muted);margin-bottom:-2px;transition:all .15s}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-panel{display:none}
.tab-panel.active{display:block}

.stats{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.stat-card{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:14px 18px;flex:1;min-width:130px}
.stat-card .sv{font-family:'Lora',serif;font-size:28px;font-weight:700;color:var(--accent)}
.stat-card .sl{font-size:12px;color:var(--muted);margin-top:2px}
.stat-card.paid .sv{color:#27543f}
.stat-card.pending .sv{color:var(--amber)}

.orders-list{display:flex;flex-direction:column;gap:12px}
.order-card{background:var(--surface);border:1.5px solid var(--line);border-radius:var(--radius);padding:18px 20px}
.order-card.new-order{border-color:var(--amber);background:#fffcf9}
.order-card.paid-order{border-color:#6B8E6F;background:#f7fdf9}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:12px;flex-wrap:wrap}
.card-org{font-size:16px;font-weight:700}
.card-name{font-size:13px;color:var(--muted);margin-top:2px}
.status-badge{font-size:11px;font-weight:700;padding:5px 12px;border-radius:999px;flex-shrink:0}
.status-badge.paid{background:#d4edda;color:#155724}
.status-badge.new{background:var(--amber-soft);color:#7a4010}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:8px 14px;margin-bottom:12px}
.cg-item .cl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px}
.cg-item .cv{font-size:13px;color:var(--ink);font-weight:500}
.card-svc{font-size:12px;color:var(--muted);background:var(--bg);border-radius:8px;padding:8px 12px;line-height:1.7;margin-bottom:8px;word-break:break-word}
.card-price{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.price-tag{font-size:12px;font-weight:700;padding:5px 12px;border-radius:8px}
.price-tag.total{background:var(--accent-soft);color:var(--accent)}
.price-tag.half{background:var(--amber-soft);color:#7a4010}
.card-date{font-size:11px;color:var(--muted);margin-top:10px;border-top:1px solid var(--line);padding-top:8px}
.empty{text-align:center;padding:50px;color:var(--muted);font-size:14px}
@media(max-width:600px){.card-grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="band"></div>
<header class="topbar">
  <div class="wrap">
    <div class="brand">
      <div class="dot-ico">🍽️</div>
      <div><h1>NOMAAD Catering</h1><div style="font-size:12px;opacity:.75;margin-top:2px">Захиалгын хяналтын самбар</div></div>
    </div>
    <div style="display:flex;gap:10px;align-items:center">
      <span class="tag">Orders 2026</span>
      <button class="btn-refresh" onclick="loadOrders()">↻ Шинэчлэх</button>
    </div>
  </div>
</header>

<div id="denied">
  <h2>🔒 Хандах эрхгүй</h2>
  <p>Энэ хуудас зөвхөн эрх бүхий хүнд нээлттэй.</p>
</div>

<main id="main" class="wrap">
  <div class="page-title">📋 Захиалгуудын жагсаалт</div>
  <p class="page-sub" id="last-refresh">Ачааллаж байна...</p>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('nomaad')">⛺ Nomaad camp</button>
    <button class="tab-btn" onclick="switchTab('busad')">🍴 Бусад захиалга</button>
  </div>

  <div id="tab-nomaad" class="tab-panel active">
    <div class="stats" id="stats-nomaad"></div>
    <div class="orders-list" id="list-nomaad"><div class="empty">Ачааллаж байна...</div></div>
  </div>
  <div id="tab-busad" class="tab-panel">
    <div class="stats" id="stats-busad"></div>
    <div class="orders-list" id="list-busad"><div class="empty">Ачааллаж байна...</div></div>
  </div>
</main>

<script>
const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbzu-NuP2z764BWOF5r3A9YkriNVc5en54Pq6NW_hApmo948xyUPM8eiqpXeJhJXDhDX8w/exec';

function checkAccess() {
  if (window.location.hash.replace('#','') === 'nomaad2026') {
    document.getElementById('main').style.display = 'block';
    loadOrders();
  } else {
    document.getElementById('denied').style.display = 'block';
  }
}

function switchTab(t) {
  document.querySelectorAll('.tab-btn').forEach(function(b,i){
    b.classList.toggle('active', (t==='nomaad'?0:1)===i);
  });
  document.querySelectorAll('.tab-panel').forEach(function(p){ p.classList.remove('active'); });
  document.getElementById('tab-'+t).classList.add('active');
}

function jsonpFetch(url) {
  return new Promise(function(resolve, reject) {
    var cbName = '__ncb_' + Date.now();
    var script = document.createElement('script');
    var timer = setTimeout(function() {
      cleanup(); reject(new Error('Timeout — 10 секунд хэтэрлээ'));
    }, 10000);
    function cleanup() {
      delete window[cbName];
      if (script.parentNode) script.parentNode.removeChild(script);
      clearTimeout(timer);
    }
    window[cbName] = function(data) { cleanup(); resolve(data); };
    script.onerror = function() { cleanup(); reject(new Error('Script load failed')); };
    script.src = url + '?callback=' + cbName;
    document.head.appendChild(script);
  });
}

async function loadOrders() {
  document.getElementById('last-refresh').textContent = 'Ачааллаж байна...';
  var errMsg = function(detail) {
    return '<div class="empty">⚠️ Өгөгдөл ачааллахад алдаа гарлаа.<br>' +
      '<small style="color:#c0392b">' + detail + '</small><br><br>' +
      '<small>Apps Script-д doGet-г шинэ version-оор Deploy хийнэ үү.</small></div>';
  };
  try {
    var data = await jsonpFetch(SHEETS_URL);
    if (data.error) {
      document.getElementById('list-nomaad').innerHTML = errMsg(data.error);
      document.getElementById('list-busad').innerHTML  = errMsg(data.error);
      document.getElementById('last-refresh').textContent = 'Алдаа';
      return;
    }
    renderSection('nomaad', data.nomaad || []);
    renderSection('busad',  data.busad  || []);
    document.getElementById('last-refresh').textContent =
      'Сүүлд шинэчлэгдсэн: ' + new Date().toLocaleString('mn-MN');
  } catch(e) {
    document.getElementById('list-nomaad').innerHTML = errMsg(e.message || 'Network алдаа');
    document.getElementById('list-busad').innerHTML  = errMsg(e.message || 'Network алдаа');
    document.getElementById('last-refresh').textContent = 'Алдаа гарлаа';
  }
}

function renderSection(key, orders) {
  var statsEl = document.getElementById('stats-'+key);
  var listEl  = document.getElementById('list-'+key);
  var paid    = orders.filter(function(o){ return o['Төлбөр төлсөн'] === true; });
  var pending = orders.filter(function(o){ return o['Төлбөр төлсөн'] !== true; });

  statsEl.innerHTML =
    stat('Нийт захиалга', orders.length, '') +
    stat('Хүлээгдэж байна', pending.length, 'pending') +
    stat('Төлбөр төлсөн', paid.length, 'paid');

  if (!orders.length) {
    listEl.innerHTML = '<div class="empty">Одоогоор захиалга байхгүй байна.</div>';
    return;
  }

  var sorted = pending.concat(paid);
  listEl.innerHTML = sorted.map(function(o) {
    var isPaid  = o['Төлбөр төлсөн'] === true;
    var date    = o['Огноо'] ? new Date(o['Огноо']).toLocaleString('mn-MN') : '';
    return '<div class="order-card '+(isPaid?'paid-order':'new-order')+'">' +
      '<div class="card-top">' +
        '<div>' +
          '<div class="card-org">'+(esc(o['Байгууллага']||'—'))+'</div>' +
          '<div class="card-name">'+(esc(o['Нэр']||''))+(o['Утас']?' · '+esc(o['Утас']):'')+'</div>' +
        '</div>' +
        '<span class="status-badge '+(isPaid?'paid':'new')+'">'+(isPaid?'✅ Төлбөр төлсөн':'⏳ Хүлээгдэж байна')+'</span>' +
      '</div>' +
      '<div class="card-grid">' +
        ci('Хүний тоо',  o['Хүний тоо']) +
        ci('Арга хэмжээ', o['Арга хэмжээ']) +
        ci('Газар',       o['Газар']) +
        ci('Эхлэх',       o['Эхлэх огноо']) +
        ci('Дуусах',      o['Дуусах өдөр']) +
        ci('И-мэйл',     o['И-мэйл']) +
      '</div>' +
      (o['Үйлчилгээ'] ? '<div class="card-svc">'+esc(o['Үйлчилгээ'])+'</div>' : '') +
      (o['Нэмэлт']    ? '<div class="card-svc" style="background:#fffbf5">🍕 '+esc(o['Нэмэлт'])+'</div>' : '') +
      (o['Тэмдэглэл'] ? '<div class="card-svc" style="color:#5e3c19">💬 '+esc(o['Тэмдэглэл'])+'</div>' : '') +
      '<div class="card-price">' +
        (o['Нийт дүн']       ? '<span class="price-tag total">Нийт: '+esc(String(o['Нийт дүн']))+'</span>' : '') +
        (o['Урьдчилгаа 50%'] ? '<span class="price-tag half">50%: '+esc(String(o['Урьдчилгаа 50%']))+'</span>' : '') +
      '</div>' +
      (date ? '<div class="card-date">📅 Захиалсан: '+date+'</div>' : '') +
    '</div>';
  }).join('');
}

function stat(label, val, cls) {
  return '<div class="stat-card '+cls+'"><div class="sv">'+val+'</div><div class="sl">'+label+'</div></div>';
}
function ci(label, val) {
  if (!val) return '';
  return '<div class="cg-item"><div class="cl">'+label+'</div><div class="cv">'+esc(String(val))+'</div></div>';
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

checkAccess();
window.addEventListener('hashchange', function(){ location.reload(); });
</script>
</body>
</html>

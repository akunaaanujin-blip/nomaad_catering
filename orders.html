<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOMAAD · Захиалгууд</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:wght@600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#F5F0E6;--surface:#fff;--ink:#20271F;--muted:#8A8276;--line:#E2E6DF;--accent:#1F4A38;--accent-soft:#E3EDE7;--amber:#C8743F;--amber-soft:#F5E2D5;--red:#BB4A36;--shadow:0 1px 3px rgba(32,39,31,.07),0 8px 20px rgba(32,39,31,.08)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}

/* Lock */
#lock{position:fixed;inset:0;background:linear-gradient(135deg,#152E22,#1F4A38);z-index:999;display:flex;align-items:center;justify-content:center}
.lock-box{background:#fff;border-radius:20px;padding:40px;max-width:360px;width:90%;text-align:center}
.lock-icon{font-size:40px;margin-bottom:12px}
.lock-title{font-family:'Lora',serif;font-size:22px;font-weight:700;margin-bottom:6px}
.lock-sub{font-size:13px;color:var(--muted);margin-bottom:22px;line-height:1.5}
.lock-inp{width:100%;font-size:20px;font-weight:700;letter-spacing:6px;text-align:center;border:2px solid var(--line);border-radius:12px;padding:12px;outline:none;margin-bottom:12px;transition:border-color .2s}
.lock-inp:focus{border-color:var(--accent)}
.lock-btn{width:100%;font-family:inherit;font-size:14px;font-weight:700;background:var(--accent);color:#fff;border:none;border-radius:12px;padding:13px;cursor:pointer}
.lock-btn:hover{opacity:.88}
.lock-err{font-size:13px;color:var(--red);margin-top:10px;display:none}

/* Header */
.header{background:linear-gradient(135deg,#152E22,#1F4A38,#2E6049);color:#fff;padding:20px 24px}
.header-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.h-brand{display:flex;align-items:center;gap:10px}
.h-icon{width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,.15);display:grid;place-items:center;font-size:18px}
.h-title{font-family:'Lora',serif;font-size:18px;font-weight:700}
.h-sub{font-size:12px;opacity:.75;margin-top:2px}
.h-back{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;background:rgba(255,255,255,.15);border:none;padding:7px 14px;border-radius:999px;color:#fff;cursor:pointer;text-decoration:none}

/* Toolbar */
.toolbar{max-width:1100px;margin:24px auto 0;padding:0 24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.toolbar h2{font-family:'Lora',serif;font-size:20px;font-weight:700;flex:1}
.btn-ref{font-family:inherit;font-size:13px;font-weight:700;background:var(--accent);color:#fff;border:none;border-radius:8px;padding:9px 18px;cursor:pointer}
.btn-ref:hover{opacity:.88}
.count-badge{font-size:12px;font-weight:700;background:var(--accent-soft);color:var(--accent);padding:4px 12px;border-radius:999px}

/* Cards */
.cards{max-width:1100px;margin:20px auto 40px;padding:0 24px;display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.card{background:var(--surface);border:1px solid var(--line);border-radius:16px;overflow:hidden;box-shadow:var(--shadow)}
.card-head{padding:14px 16px;border-bottom:1px solid var(--line);display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.c-org{font-weight:700;font-size:15px}
.c-date{font-size:11px;color:var(--muted);margin-top:2px}
.c-status{font-size:11px;font-weight:700;padding:3px 10px;border-radius:999px}
.s-new{background:#dceaf5;color:#1a4a7a}
.s-prog{background:var(--amber-soft);color:#7a4a10}
.s-done{background:var(--accent-soft);color:var(--accent)}
.card-body{padding:14px 16px;display:flex;flex-direction:column;gap:8px}
.row{display:flex;gap:8px;font-size:13px}
.row .lbl{font-size:11px;font-weight:700;color:var(--muted);min-width:80px;flex-shrink:0;padding-top:1px}
.row .val{color:var(--ink)}
.empty{text-align:center;padding:60px 20px;color:var(--muted);font-size:14px;grid-column:1/-1}
.loading{text-align:center;padding:60px 20px;color:var(--muted);font-size:14px;grid-column:1/-1}
@media(max-width:500px){.cards{grid-template-columns:1fr}}
</style>
</head>
<body>

<div id="lock">
  <div class="lock-box">
    <div class="lock-icon">🔐</div>
    <div class="lock-title">NOMAAD Catering</div>
    <div class="lock-sub">Тогооч болон удирдагч нарт зориулагдсан.<br>Нууц үгээ оруулна уу.</div>
    <input class="lock-inp" id="li" type="password" placeholder="••••" maxlength="20" onkeydown="if(event.key==='Enter')auth()">
    <button class="lock-btn" onclick="auth()">Нэвтрэх →</button>
    <div class="lock-err" id="le">⚠️ Нууц үг буруу</div>
  </div>
</div>

<div id="app" style="display:none">
  <div class="header">
    <div class="header-inner">
      <div class="h-brand">
        <div class="h-icon">📋</div>
        <div>
          <div class="h-title">Ирсэн захиалгууд</div>
          <div class="h-sub">NOMAAD Catering · Чимун ХХК</div>
        </div>
      </div>
      <a class="h-back" href="kitchen.html#nomaad2026">← Технологи карт</a>
    </div>
  </div>

  <div class="toolbar">
    <h2>📋 Захиалгууд</h2>
    <span class="count-badge" id="cnt">...</span>
    <button class="btn-ref" onclick="load()">🔄 Шинэчлэх</button>
  </div>

  <div class="cards" id="cards">
    <div class="loading">⏳ Уншиж байна...</div>
  </div>
</div>

<script>
var PASS = 'nomaad2026';
var KEY  = 'nomaad_orders_auth';
var CSV  = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTgmE0uJku8GxYhIua11kx0_h-LeRXF-MCGvGeAh6qCTsAo1x6wcdBvNey6Jn-6F8_hVIFmLIGqmEsx/pub?gid=635195893&single=true&output=csv';

function auth() {
  var v = document.getElementById('li').value;
  if (v === PASS || location.hash === '#' + PASS) {
    sessionStorage.setItem(KEY, 'ok');
    document.getElementById('lock').style.display = 'none';
    document.getElementById('app').style.display  = 'block';
    load();
  } else {
    document.getElementById('le').style.display = 'block';
  }
}

// Hash нэвтрэлт
if (location.hash === '#' + PASS || sessionStorage.getItem(KEY) === 'ok') {
  document.getElementById('lock').style.display = 'none';
  document.getElementById('app').style.display  = 'block';
}

function load() {
  var el = document.getElementById('cards');
  el.innerHTML = '<div class="loading">⏳ Уншиж байна...</div>';
  document.getElementById('cnt').textContent = '...';

  fetch(CSV)
    .then(function(r) {
      if (!r.ok) throw new Error(r.status);
      return r.text();
    })
    .then(function(text) {
      var orders = parseCSV(text);
      render(orders);
    })
    .catch(function(e) {
      el.innerHTML = '<div class="empty">❌ Уншиж чадсангүй: ' + e.message + '</div>';
    });
}

function parseCSV(text) {
  var rows = text.trim().split('\n');
  var result = [];
  for (var i = rows.length - 1; i >= 1; i--) {
    var c = splitRow(rows[i]);
    if (!c[1] && !c[2]) continue;
    result.push({date:c[0],org:c[1],name:c[2],phone:c[3],evdate:c[4],pax:c[5],svc:c[6],note:c[7],status:c[8]||'New'});
  }
  return result;
}

function splitRow(row) {
  var cols=[], cur='', q=false;
  for (var i=0; i<row.length; i++) {
    var ch=row[i];
    if (ch==='"') { q=!q; }
    else if (ch===',' && !q) { cols.push(cur); cur=''; }
    else { cur+=ch; }
  }
  cols.push(cur);
  return cols;
}

function render(orders) {
  document.getElementById('cnt').textContent = orders.length + ' захиалга';
  if (!orders.length) {
    document.getElementById('cards').innerHTML = '<div class="empty">📭 Одоогоор захиалга байхгүй байна.</div>';
    return;
  }
  var sc = {New:'s-new','Шинэ':'s-new','Хийгдэж байна':'s-prog','Дууссан':'s-done'};
  var st = {New:'Шинэ'};
  var h = '';
  for (var i=0; i<orders.length; i++) {
    var o=orders[i], cls=sc[o.status]||'s-new', stxt=st[o.status]||o.status;
    h += '<div class="card">' +
      '<div class="card-head">' +
        '<div><div class="c-org">'+(o.org||'—')+'</div><div class="c-date">'+o.date+'</div></div>' +
        '<span class="c-status '+cls+'">'+stxt+'</span>' +
      '</div>' +
      '<div class="card-body">' +
        row('👤 Нэр', o.name) +
        row('📞 Утас', o.phone) +
        row('📅 Огноо', o.evdate||'—') +
        row('👥 Хүн', o.pax||'—') +
        row('🍴 Үйлчилгээ', o.svc||'—') +
        (o.note ? row('📝 Тэмдэглэл', o.note) : '') +
      '</div></div>';
  }
  document.getElementById('cards').innerHTML = h;
}

function row(l, v) {
  return '<div class="row"><span class="lbl">'+l+'</span><span class="val">'+(v||'—')+'</span></div>';
}

// Автоматаар ачааллах
if (sessionStorage.getItem(KEY)==='ok' || location.hash==='#'+PASS) load();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOMAAD · Коктейлийн цэс</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,500;1,600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --green-0:#08211a; --green-1:#0d2c22;
    --gold-1:#e7cf9b; --gold-2:#c8a25c; --gold-3:#f6e7bd;
    --cream:#f2ecdd; --sage:#9fb1a3;
    --line:rgba(200,162,92,.38);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:#061611;}
  body{
    font-family:'Montserrat',sans-serif;
    display:flex;justify-content:center;
    padding:34px 18px;color:var(--cream);
    -webkit-font-smoothing:antialiased;
  }
  .poster{
    position:relative;width:100%;max-width:860px;
    background:radial-gradient(120% 80% at 50% -10%, #15402f 0%, var(--green-1) 42%, var(--green-0) 100%);
    padding:30px;overflow:hidden;
    box-shadow:0 40px 120px rgba(0,0,0,.6), 0 0 0 1px rgba(0,0,0,.4);
  }
  .frame{position:absolute;inset:18px;border:1px solid var(--line);pointer-events:none}
  .frame::before{content:"";position:absolute;inset:6px;border:1px solid rgba(200,162,92,.18)}
  .corner{position:absolute;width:22px;height:22px;border:1.5px solid var(--gold-2)}
  .corner.tl{top:11px;left:11px;border-right:none;border-bottom:none}
  .corner.tr{top:11px;right:11px;border-left:none;border-bottom:none}
  .corner.bl{bottom:11px;left:11px;border-right:none;border-top:none}
  .corner.br{bottom:11px;right:11px;border-left:none;border-top:none}
  .poster::after{
    content:"";position:absolute;inset:0;pointer-events:none;
    background-image:radial-gradient(rgba(231,207,155,.04) 1px, transparent 1px);
    background-size:7px 7px;opacity:.5;
  }
  .inner{position:relative;z-index:2;padding:30px 32px 24px}

  /* ── Header ── */
  .brand{text-align:center;font-size:11px;letter-spacing:7px;font-weight:500;color:var(--gold-1);text-transform:uppercase;margin-bottom:14px;padding-left:7px}
  .glass-ico{display:block;margin:0 auto 10px;width:56px;height:56px}
  .title{
    font-family:'Cormorant Garamond',serif;font-weight:600;text-align:center;line-height:1;
    font-size:62px;letter-spacing:1px;
    background:linear-gradient(180deg,var(--gold-3) 0%,var(--gold-1) 45%,var(--gold-2) 100%);
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  }
  .deco-rule{display:flex;align-items:center;justify-content:center;gap:12px;margin:20px auto 4px;max-width:320px}
  .deco-rule .ln{height:1px;flex:1;background:linear-gradient(90deg,transparent,var(--gold-2))}
  .deco-rule .ln.r{background:linear-gradient(90deg,var(--gold-2),transparent)}
  .deco-rule .dot{width:6px;height:6px;transform:rotate(45deg);background:var(--gold-1);box-shadow:0 0 0 3px rgba(231,207,155,.12)}

  /* ── Cocktail list ── */
  .list{margin-top:18px}
  .cocktail{display:flex;gap:15px;padding:14px 4px;border-bottom:1px solid rgba(200,162,92,.14)}
  .cocktail:last-child{border-bottom:none}
  .num{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:500;color:var(--gold-2);min-width:32px;line-height:1.3;opacity:.8}
  .c-body{flex:1;min-width:0}
  .c-top{display:flex;align-items:baseline;gap:10px}
  .c-name{font-family:'Cormorant Garamond',serif;font-weight:700;font-size:26px;color:var(--cream);line-height:1.1;letter-spacing:.3px;flex:none}
  .leader{flex:1;border-bottom:1px dotted rgba(200,162,92,.45);transform:translateY(-5px);min-width:18px}
  .c-price{flex:none;font-family:'Cormorant Garamond',serif;font-weight:600;font-size:22px;color:var(--gold-1);white-space:nowrap}
  .c-ing{margin-top:6px;font-size:11.5px;line-height:1.85;font-weight:300;color:#d7d1c2}
  .ing-n{color:#e9e3d4}
  .ing-a{color:var(--gold-1);font-weight:500;white-space:nowrap}
  .ing-garnish{color:var(--sage);font-style:italic}
  .ing-sep{color:var(--gold-2);opacity:.55;margin:0 7px}

  /* ── Footer ── */
  .footer{margin-top:26px;text-align:center}
  .footer .deco-rule{margin-bottom:14px}
  .f-cheers{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:22px;color:var(--gold-1)}
  .f-note{font-size:8.5px;letter-spacing:3px;color:var(--sage);text-transform:uppercase;margin-top:9px;padding-left:3px}

  @media (max-width:560px){
    .inner{padding:18px 12px 16px}
    .title{font-size:44px}
    .c-name{font-size:21px}.c-price{font-size:19px}
    .cocktail{gap:9px}.num{min-width:24px;font-size:18px}
    .c-ing{font-size:11px}.ing-sep{margin:0 4px}
  }
  @media print{
    @page{size:227mm 374mm;margin:0}
    html,body{background:#061611}
    body{padding:0}
    .poster{box-shadow:none;width:227mm;max-width:none}
    *{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  }
</style>
</head>
<body>
  <div class="poster">
    <div class="frame"></div>
    <span class="corner tl"></span><span class="corner tr"></span>
    <span class="corner bl"></span><span class="corner br"></span>

    <div class="inner">
      <div class="brand">N O M A A D</div>

      <svg class="glass-ico" viewBox="0 0 100 100" fill="none" stroke="url(#g)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#f6e7bd"/><stop offset="1" stop-color="#c8a25c"/>
        </linearGradient></defs>
        <path d="M22 26 H78 L54 56 V76"/>
        <path d="M22 26 L50 50 L78 26"/>
        <path d="M40 84 H68"/>
        <path d="M54 76 L66 82"/>
        <circle cx="67" cy="20" r="4.5" fill="url(#g)" stroke="none"/>
        <path d="M67 24 V40" stroke-width="1.4"/>
      </svg>

      <h1 class="title">Коктейлийн цэс</h1>
      <div class="deco-rule"><span class="ln"></span><span class="dot"></span><span class="ln r"></span></div>

      <div id="list" class="list"></div>

      <div class="deco-rule" style="margin-top:24px"><span class="ln"></span><span class="dot"></span><span class="ln r"></span></div>
    </div>
  </div>

<script>
// Үнийг "price" талбарт бичнэ үү (жнь price:'25,000₮'). Хоосон бол "₮ —" гэж харагдана.
const ITEMS = [
  {name:'B-52',             price:'', ing:'Кофены ликёр (Kahlúa) – 15 мл · Ирланд цөцгийн ликёр (Baileys) – 15 мл · Жүржийн ликёр (Grand Marnier / Cointreau) – 15 мл · Мөс – 400 гр'},
  {name:'4th of July',      price:'', ing:'Анар жимсний сироп (Grenadine) – 15 мл · Тоорын ликёр (Peach Schnapps) – 15 мл · Цэнхэр Кюрасао ликёр (Blue Curaçao) – 15 мл · Водка – 15 мл · Мөс – 400 гр'},
  {name:'Sea Breeze',       price:'', ing:'Водка – 45 мл · Цангис жимсний шүүс – 120 мл · Бэрсүүт жүржийн шүүс – 30 мл · Лайм жимсний зүсэм (чимэглэлд) · Мөс – 400 гр'},
  {name:'Strawberry Basil', price:'', ing:'Жин (Gin) – 50 мл · Гүзээлзгэний пюре (strawberry puree) – 50 мл · Шинэхэн райхон (basil) навч – 4-5 ширхэг · Нимбэгний шүүс – 15 мл · Сахарын сироп – 15 мл · Мөс – 400 гр'},
  {name:'Tequila Sunrise',  price:'', ing:'Текила (Blanco) – 45 мл · Шинэхэн жүржийн шүүс – 90 мл · Анар жимсний сироп (Grenadine) – 15 мл · Жүржийн зүсэм болон интоор (чимэглэлд) · Мөс – 400 гр'},
  {name:'Gin and Tonic',    price:'', ing:'Жин (Gin) – 50 мл · Тоник ус – 120 мл · Шинэхэн лайм жимсний зүсэм · Мөс – 400 гр'},
  {name:'Vodka Cranberry',  price:'', ing:'Водка – 50 мл · Цангис жимсний шүүс – 120 мл · Лайм жимсний зүсэм (чимэглэлд) · Мөс – 400 гр'},
  {name:'Blueberry Thyme',  price:'', ing:'Водка эсвэл Жин – 50 мл · Нэрсний пюре (blueberry puree) – 50 мл · Ганга өвсний (thyme) нахиа – 2-3 ширхэг · Нимбэгний шүүс – 20 мл · Зөгийн бал эсвэл сахарын сироп – 15 мл · Мөс – 400 гр'},
  {name:'Whiskey Sour',     price:'', ing:'Бурбон виски – 60 мл · Шинэхэн нимбэгний шүүс – 30 мл · Сахарын сироп – 20 мл · Өндөгний цагаан (хөөсрүүлэгч) – 1 ширхэг · Ангостура биттер (хэдэн дусал) · Мөс – 400 гр'},
  {name:"Devil's Margarita",price:'', ing:'Текила (Blanco) – 45 мл · Шинэхэн лаймны шүүс – 22 мл · Сахарын сироп – 22 мл · Хуурай улаан дарс (дээр нь хөвүүлэх) – 15 мл · Мөс – 400 гр'},
];

function fmtIng(s){
  return s.split(' · ').map(function(piece){
    var m = piece.split(/\s[–-]\s/);
    if(m.length >= 2){
      return '<span class="ing-n">'+m[0]+'</span> <span class="ing-a">'+m.slice(1).join(' – ')+'</span>';
    }
    return '<span class="ing-garnish">'+piece+'</span>';
  }).join('<span class="ing-sep">·</span>');
}

var html = '';
ITEMS.forEach(function(c, i){
  var n = i+1;
  html += '<div class="cocktail">' +
    '<div class="num">'+(n<10?'0':'')+n+'</div>' +
    '<div class="c-body">' +
      '<div class="c-top">' +
        '<span class="c-name">'+c.name+'</span>' +
        '<span class="leader"></span>' +
        '<span class="c-price">'+(c.price ? c.price : '₮ —')+'</span>' +
      '</div>' +
      '<div class="c-ing">'+fmtIng(c.ing)+'</div>' +
    '</div>' +
  '</div>';
});
document.getElementById('list').innerHTML = html;
</script>
</body>
</html>
